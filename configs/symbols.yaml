# Multi-symbol configuration for ubuntu-wallet
#
# Per-symbol fields:
#   enabled        - set false to exclude symbol from batch runs / services
#   interval       - primary kline interval used for training and inference
#   mt_filter_mode - multi-timeframe trend filter mode: off|daily_guard|...
#   threshold      - minimum per-class probability to enter a trade (p_enter)
#   tp             - take-profit fraction (e.g. 0.0230 = 2.30%)
#   sl             - stop-loss fraction   (e.g. 0.0090 = 0.90%)
#   horizon        - forward look-ahead bars for label generation
#   calibration    - probability calibration method: isotonic | sigmoid | none

symbols:

  # ---------- Phase 1 ----------

  BTCUSDT:
    enabled: true
    interval: "1h"
    mt_filter_mode: "off"
    threshold: 0.67
    tp: 0.0230
    sl: 0.0090
    horizon: 12
    calibration: "isotonic"

  ETHUSDT:
    enabled: true
    interval: "1h"
    mt_filter_mode: "off"
    threshold: 0.67
    tp: 0.0230
    sl: 0.0110
    horizon: 12
    calibration: "isotonic"

  SOLUSDT:
    enabled: true
    interval: "1h"
    mt_filter_mode: "off"
    threshold: 0.67
    tp: 0.0230
    sl: 0.0120
    horizon: 6
    calibration: "isotonic"

  BNBUSDT:
