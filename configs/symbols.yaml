# Multi-symbol configuration for ubuntu-wallet
#
# Each symbol has isolated data and model directories while sharing the same
# codebase and pipeline.  Isolation is achieved purely through per-symbol
# directory scoping:
#
#   data/<SYMBOL>/klines_1h.json
#   data/<SYMBOL>/klines_4h.json
#   data/<SYMBOL>/klines_1d.json
#   data/<SYMBOL>/predictions_log.jsonl
#   data/<SYMBOL>/reports/
#
#   models/<SYMBOL>/current/          <- active model artifacts
#   models/<SYMBOL>/archive/          <- versioned snapshots
#   models/<SYMBOL>/registry.json     <- model registry
#
# Phased rollout:
#   Phase 1 (initial active): BTCUSDT, ETHUSDT, SOLUSDT, BNBUSDT
#   Phase 2 (staged):         XRPUSDT, DOGEUSDT, ADAUSDT
#
# Per-symbol fields:
#   enabled      - set false to exclude symbol from batch runs / systemd services
#   interval     - primary kline interval used for training and inference
#   threshold    - minimum per-class probability to enter a trade (p_enter)
#   tp           - take-profit fraction (e.g. 0.0175 = 1.75%)
#   sl           - stop-loss fraction   (e.g. 0.009  = 0.90%)
#   horizon      - forward look-ahead bars for label generation
#   calibration  - probability calibration method: isotonic | sigmoid | none

symbols:

  # ---------- Phase 1 ----------

  BTCUSDT:
    enabled: true
    interval: "1h"
    threshold: 0.65
    tp: 0.0175
    sl: 0.009
    horizon: 12
    calibration: "isotonic"

  ETHUSDT:
    enabled: true
    interval: "1h"
    threshold: 0.65
    tp: 0.0175
    sl: 0.009
    horizon: 12
    calibration: "isotonic"

  SOLUSDT:
    enabled: true
    interval: "1h"
    threshold: 0.65
    tp: 0.020
    sl: 0.010
    horizon: 12
    calibration: "isotonic"

  BNBUSDT:
    enabled: true
    interval: "1h"
    threshold: 0.65
    tp: 0.0175
    sl: 0.009
    horizon: 12
    calibration: "isotonic"

  # ---------- Phase 2 ----------

  XRPUSDT:
    enabled: false
    interval: "1h"
    threshold: 0.65
    tp: 0.020
    sl: 0.010
    horizon: 12
    calibration: "isotonic"

  DOGEUSDT:
    enabled: false
    interval: "1h"
    threshold: 0.65
    tp: 0.020
    sl: 0.010
    horizon: 12
    calibration: "isotonic"

  ADAUSDT:
    enabled: false
    interval: "1h"
    threshold: 0.65
    tp: 0.020
    sl: 0.010
    horizon: 12
    calibration: "isotonic"
